name: CI

on:
  push:
  pull_request:
  
jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Run Linter
      run: |
        uv run ruff check --no-fix .

    - name: Run Formatter
      run: |
        uv run ruff format --check .

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Extension Dependencies
      working-directory: pi-extension
      run: npm ci

    - name: Typecheck (Extension)
      working-directory: pi-extension
      run: npx tsc

    - name: Lint (Extension)
      working-directory: pi-extension
      run: npx biome check .

    - name: Run Python Tests
      run: |
        uv run pytest

    - name: Run Extension Tests
      working-directory: pi-extension
      run: npm test
