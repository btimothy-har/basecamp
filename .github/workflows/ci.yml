name: CI

on:
  push:
  pull_request:
  
jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Run Linter
      run: |
        uv run ruff check --no-fix .

    - name: Run Formatter
      run: |
        uv run ruff format --check .

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Extension Dependencies
      run: |
        npm --prefix pi-extension ci
        npm --prefix pi-swarm/extension ci

    - name: Typecheck (Extension)
      run: |
        npm --prefix pi-extension run typecheck
        npm --prefix pi-swarm/extension run typecheck

    - name: Lint (Extension)
      run: |
        npm --prefix pi-extension run lint
        npm --prefix pi-swarm/extension run lint

    - name: Run Python Tests
      run: |
        uv run pytest

    - name: Run Extension Tests
      run: |
        npm --prefix pi-extension test
        npm --prefix pi-swarm/extension test
