name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Run Linter
      run: |
        uv run ruff check --no-fix .

    - name: Run Formatter
      run: |
        uv run ruff format --check .

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Pi Package Dependencies
      run: |
        for pkg in core/pi pi-ui workspace/pi pi-tasks pi-git pi-engineering pi-companion/pi pi-swarm/extension; do
          npm --prefix "$pkg" ci
        done

    - name: Typecheck Pi Packages
      run: |
        for pkg in core/pi pi-ui workspace/pi pi-tasks pi-git pi-engineering pi-companion/pi pi-swarm/extension; do
          npm --prefix "$pkg" run typecheck
        done

    - name: Lint Pi Packages
      run: |
        for pkg in core/pi pi-ui workspace/pi pi-tasks pi-git pi-engineering pi-companion/pi pi-swarm/extension; do
          npm --prefix "$pkg" run lint
        done

    - name: Run Python Tests
      run: |
        uv run pytest

    - name: Run Pi Package Tests
      run: |
        for pkg in core/pi pi-ui workspace/pi pi-tasks pi-git pi-engineering pi-companion/pi pi-swarm/extension; do
          npm --prefix "$pkg" test
        done
