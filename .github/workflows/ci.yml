name: CI

on:
  push:
  pull_request:
  
jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Run Linter
      run: |
        uv run ruff check --no-fix .

    - name: Run Formatter
      run: |
        uv run ruff format --check .
    
    - name: Run Tests (Core)
      run: |
        uv run --project core pytest
    
    - name: Run Tests (Observer)
      working-directory: observer
      run: |
        uv run --project observer pytest
